name: DB Migration

on:
  push:
    branches: [main]
    paths:
      - "packages/db/drizzle/**"
      - ".github/workflows/db-migrate.yml"
  workflow_dispatch:
    inputs:
      command:
        description: "Migration command to run"
        required: true
        type: choice
        options:
          - db:migrate
          - db:push
          - db:seed

jobs:
  migrate:
    name: Run migration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.4"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Extract DATABASE_URL from BACKEND_ENV
        run: |
          echo "${{ secrets.BACKEND_ENV }}" | tr ',' '\n' | grep '^DATABASE_URL=' >> "$GITHUB_ENV"

      - name: Run migration
        working-directory: packages/db
        run: bun run ${{ inputs.command || 'db:migrate' }}
